name: CI/CD - Validate & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Environment

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install openenv-core
        run: pip install openenv-core

      - name: Validate OpenEnv spec
        run: openenv validate

  docker-build:
    runs-on: ubuntu-latest
    name: Test Docker Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./server/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to HF Spaces
    needs: [ validate, docker-build ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install openenv-core
        run: pip install openenv-core

      - name: Validate OpenEnv spec (final check)
        run: openenv validate

      - name: Deploy to HF Spaces
        run: |
          openenv push --repo-id Supreeth/verirl-env
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Post deployment info
        if: success()
        run: |
          echo "✓ Deployment complete!"
          echo "Space URL: https://huggingface.co/spaces/Supreeth/verirl-env"
