name: Deploy to HF Spaces

on:
  workflow_dispatch:
    inputs:
      repo_id:
        description: 'HF repo ID (e.g., username/verirl-env)'
        required: true
        default: 'Supreeth/verirl-env'
      private:
        description: 'Make space private'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install openenv-core
        run: pip install openenv-core

      - name: Validate OpenEnv spec
        run: openenv validate

      - name: Deploy to HF Spaces
        run: |
          openenv push \
            --repo-id "${{ github.event.inputs.repo_id }}" \
            $([ "${{ github.event.inputs.private }}" = "true" ] && echo "--private" || true)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Post deployment info
        run: |
          REPO_ID="${{ github.event.inputs.repo_id }}"
          echo "✓ Deployment complete!"
          echo "Space URL: https://huggingface.co/spaces/$REPO_ID"
