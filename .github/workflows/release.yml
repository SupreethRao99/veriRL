name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.2.0)'
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install towncrier
        run: pip install towncrier

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Generate changelog
        run: |
          towncrier build --version ${{ github.event.inputs.version }} --yes

      - name: Commit changelog
        run: |
          git add CHANGELOG.md pyproject.toml .changelog.d/
          git commit -m "Release v${{ github.event.inputs.version }}"

      - name: Create git tag
        run: |
          git tag -a v${{ github.event.inputs.version }} -m "Release v${{ github.event.inputs.version }}"

      - name: Push changes
        run: |
          git push origin main
          git push origin v${{ github.event.inputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable
          labels: |
            org.opencontainers.image.version=${{ github.event.inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post release info
        run: |
          echo "✓ Release v${{ github.event.inputs.version }} published!"
          echo ""
          echo "Changelog: https://github.com/SupreethRao99/veriRL/blob/main/CHANGELOG.md"
          echo "Release: https://github.com/SupreethRao99/veriRL/releases/tag/v${{ github.event.inputs.version }}"
          echo ""
          echo "Docker Images:"
          echo "  ghcr.io/SupreethRao99/veriRL:v${{ github.event.inputs.version }}"
          echo "  ghcr.io/SupreethRao99/veriRL:latest"
          echo ""
          echo "Pull the image:"
          echo "  docker pull ghcr.io/SupreethRao99/veriRL:v${{ github.event.inputs.version }}"
          echo ""
          echo "Run the environment:"
          echo "  docker run -p 8000:8000 ghcr.io/SupreethRao99/veriRL:v${{ github.event.inputs.version }}"
