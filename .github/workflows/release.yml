name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install towncrier
        run: pip install towncrier

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Generate changelog
        run: |
          towncrier build --version ${{ github.event.inputs.version }} --yes

      - name: Commit changelog
        run: |
          git add CHANGELOG.md pyproject.toml .changelog.d/
          git commit -m "Release v${{ github.event.inputs.version }}"

      - name: Create git tag
        run: |
          git tag -a v${{ github.event.inputs.version }} -m "Release v${{ github.event.inputs.version }}"

      - name: Push changes
        run: |
          git push origin main
          git push origin v${{ github.event.inputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post release info
        run: |
          echo "✓ Release v${{ github.event.inputs.version }} published!"
          echo "Changelog: https://github.com/SupreethRao99/veriRL/blob/main/CHANGELOG.md"
          echo "Release: https://github.com/SupreethRao99/veriRL/releases/tag/v${{ github.event.inputs.version }}"
